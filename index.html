<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌄 Nagaland Travel Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
--forest:#1e3a2f;
--forest-2:#2b5240;
--sage:#4a7c5f;
--cream:#f5f0e8;
--parchment:#ece5d4;
--terra:#c46a35;
--terra-lt:#e8905e;
--gold:#d4a24a;
--charcoal:#2c2825;
--muted:#7a6f63;
--white:#fff;
--radius:14px;
}

html,body{
height:100%;
font-family:'DM Sans',sans-serif;
background:var(--forest);
}

.shell{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:1.5rem;
}

.card{
width:100%;
max-width:720px;
height:min(90vh,840px);
background:var(--cream);
border-radius:24px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 32px 80px rgba(0,0,0,0.45);
}

.header{
background:var(--forest-2);
padding:1.25rem 1.75rem;
display:flex;
align-items:center;
gap:14px;
}

.header-icon{
width:44px;
height:44px;
border-radius:12px;
background:var(--terra);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.header-text h1{
font-family:'Playfair Display',serif;
font-size:1.15rem;
color:var(--cream);
}

.header-text p{
font-size:0.72rem;
color:var(--sage);
}

/* CHAT */

.chat-box{
flex:1;
overflow-y:auto;
padding:1.5rem 1.75rem;
display:flex;
flex-direction:column;
gap:1rem;
}

.msg{
display:flex;
gap:10px;
}

.msg.user{
flex-direction:row-reverse;
}

.avatar{
width:32px;
height:32px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.msg.bot .avatar{background:var(--forest-2);}
.msg.user .avatar{background:var(--terra);color:white;}

.bubble{
max-width:78%;
padding:0.75rem 1rem;
border-radius:var(--radius);
font-size:0.875rem;
line-height:1.6;
}

.msg.bot .bubble{
background:white;
border-bottom-left-radius:4px;
}

.msg.user .bubble{
background:var(--forest-2);
color:white;
border-bottom-right-radius:4px;
}

/* QUICK BUTTONS */

.quick-buttons{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:10px 16px;
background:var(--parchment);
border-top:1px solid #ddd;
}

.quick-btn{
background:white;
border:none;
padding:6px 12px;
border-radius:999px;
font-size:12px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}

.quick-btn:hover{
background:var(--terra);
color:white;
}

/* INPUT */

.input-bar{
display:flex;
gap:10px;
padding:1rem 1.25rem;
background:var(--parchment);
}

#user-input{
flex:1;
border-radius:99px;
padding:0.6rem 1.1rem;
border:none;
}

#send-btn{
width:40px;
height:40px;
border-radius:50%;
border:none;
background:var(--terra);
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="shell">
<div class="card">

<header class="header">

<div class="header-icon">🌄</div>

<div class="header-text">
<h1>Nagaland Travel Assistant</h1>
<p>🧭 Local knowledge + AI travel guide</p>
</div>

</header>

<div class="chat-box" id="chat-box"></div>

<!-- QUICK SUGGESTION BUTTONS -->

<div class="quick-buttons">

<button class="quick-btn" onclick="quickAsk('best places in nagaland')">📍 Best Places</button>

<button class="quick-btn" onclick="quickAsk('famous food in nagaland')">🍜 Food</button>

<button class="quick-btn" onclick="quickAsk('good hotels in nagaland')">🏨 Hotels</button>

<button class="quick-btn" onclick="quickAsk('things to do in nagaland')">🎯 Activities</button>

<button class="quick-btn" onclick="quickAsk('how to reach nagaland')">🚗 Transport</button>

<button class="quick-btn" onclick="quickAsk('3 day itinerary for nagaland')">🗺️ 3 Day Trip</button>

</div>

<div class="input-bar">
<input id="user-input" type="text" placeholder="Ask about food 🍜 places 📍 hotels 🏨...">
<button id="send-btn" onclick="sendMessage()">➤</button>
</div>

</div>
</div>

<script>

const chatBox=document.getElementById("chat-box");
const input=document.getElementById("user-input");
const sendBtn=document.getElementById("send-btn");

let isWaiting=false;

function appendMsg(role,content){

const wrap=document.createElement("div");
wrap.classList.add("msg",role);

const avatar=document.createElement("div");
avatar.classList.add("avatar");
avatar.textContent=role==="bot"?"🧭":"🙂";

const bubble=document.createElement("div");
bubble.classList.add("bubble");
bubble.innerHTML=content.replace(/\n/g,"<br>");

wrap.appendChild(avatar);
wrap.appendChild(bubble);

chatBox.appendChild(wrap);
chatBox.scrollTop=chatBox.scrollHeight;

}

function quickAsk(text){

input.value=text;
sendMessage();

}

async function sendMessage(){

const text=input.value.trim();
if(!text || isWaiting) return;

isWaiting=true;
input.value="";

appendMsg("user",text);
appendMsg("bot","Typing...");

try{

const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data=await res.json();

chatBox.lastChild.querySelector(".bubble").innerHTML=data.response.replace(/\n/g,"<br>");

}catch{

chatBox.lastChild.querySelector(".bubble").innerHTML="⚠️ Server not responding";

}

isWaiting=false;

}

input.addEventListener("keydown",e=>{
if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
